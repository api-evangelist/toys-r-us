naftiko: "1.0.0-alpha1"

info:
  label: "Toys R Us Commerce API"
  description: "LogicBroker-powered commerce API for supplier and dropship vendor integrations covering orders, acknowledgements, shipments, invoices, and product catalog management."
  tags:
    - Commerce
    - Dropship
    - E-Commerce
    - Order Management
    - Retail
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TOYS_R_US_API_KEY: TOYS_R_US_API_KEY

capability:
  consumes:
    - type: http
      namespace: toys-r-us-commerce
      baseUri: https://commerceapi.io
      description: "LogicBroker Commerce API for Toys R Us supplier integrations"
      authentication:
        type: apikey
        key: subscription-key
        value: "{{TOYS_R_US_API_KEY}}"
        placement: header
      resources:
        - name: orders
          path: /api/v2/orders
          description: "Purchase order management"
          operations:
            - name: get-orders
              method: GET
              description: "Retrieve a list of purchase orders"
              inputParameters:
                - name: status
                  in: query
                  type: integer
                  required: false
                  description: "Filter by status code"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Records per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-order
              method: GET
              description: "Retrieve a single purchase order by key"
              inputParameters:
                - name: key
                  in: path
                  type: integer
                  required: true
                  description: "Unique document key"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: acknowledgements
          path: /api/v2/acknowledgements
          description: "Order acknowledgement workflows"
          operations:
            - name: get-acknowledgements
              method: GET
              description: "Retrieve a list of order acknowledgements"
              inputParameters:
                - name: status
                  in: query
                  type: integer
                  required: false
                  description: "Filter by status code"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-acknowledgement
              method: POST
              description: "Submit an order acknowledgement"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  PartnerPO: "{{tools.partner_po}}"
                  Lines: "{{tools.lines}}"
        - name: shipments
          path: /api/v2/shipments
          description: "Shipment notification management"
          operations:
            - name: get-shipments
              method: GET
              description: "Retrieve a list of shipment notifications"
              inputParameters:
                - name: status
                  in: query
                  type: integer
                  required: false
                  description: "Filter by status code"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-shipment
              method: POST
              description: "Submit a shipment notification"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  PartnerPO: "{{tools.partner_po}}"
                  ShipDate: "{{tools.ship_date}}"
                  Carrier: "{{tools.carrier}}"
                  Packages: "{{tools.packages}}"
        - name: invoices
          path: /api/v2/invoices
          description: "Invoice processing"
          operations:
            - name: get-invoices
              method: GET
              description: "Retrieve a list of invoices"
              inputParameters:
                - name: status
                  in: query
                  type: integer
                  required: false
                  description: "Filter by status code"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-invoice
              method: POST
              description: "Submit an invoice"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  PartnerPO: "{{tools.partner_po}}"
                  InvoiceNumber: "{{tools.invoice_number}}"
                  InvoiceDate: "{{tools.invoice_date}}"
                  Lines: "{{tools.lines}}"
        - name: products
          path: /api/v2/products
          description: "Product catalog synchronization"
          operations:
            - name: get-products
              method: GET
              description: "Retrieve a list of product catalog items"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-product
              method: POST
              description: "Create or update a product catalog item"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  SupplierSKU: "{{tools.supplier_sku}}"
                  Description: "{{tools.description}}"
                  UnitPrice: "{{tools.unit_price}}"
                  InStock: "{{tools.in_stock}}"

  exposes:
    - type: rest
      port: 8100
      namespace: toys-r-us-commerce-api
      resources:
        - path: /v1/orders
          name: orders
          description: "Purchase orders"
          operations:
            - method: GET
              name: get-orders
              description: "Retrieve purchase orders"
              call: "toys-r-us-commerce.get-orders"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/shipments
          name: shipments
          description: "Shipment notifications"
          operations:
            - method: POST
              name: create-shipment
              description: "Submit shipment notification"
              call: "toys-r-us-commerce.create-shipment"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: toys-r-us-commerce-mcp
      transport: http
      tools:
        - name: get-orders
          description: "Retrieve Toys R Us purchase orders"
          hints:
            readOnly: true
            openWorld: false
          call: "toys-r-us-commerce.get-orders"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-shipment
          description: "Submit a shipment notification for a Toys R Us order"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "toys-r-us-commerce.create-shipment"
          outputParameters:
            - type: object
              mapping: "$."
