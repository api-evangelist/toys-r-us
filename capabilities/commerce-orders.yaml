naftiko: 1.0.0-alpha2
info:
  label: Toys R Us Commerce API — Orders
  description: 'Toys R Us Commerce API — Orders. 2 operations. Lead operation: Get Orders. Self-contained Naftiko capability
    covering one Toys R Us business surface.'
  tags:
  - Toys R Us
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOYS_R_US_API_KEY: TOYS_R_US_API_KEY
capability:
  consumes:
  - type: http
    namespace: commerce-orders
    baseUri: https://commerceapi.io
    description: Toys R Us Commerce API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-orders
      path: /api/v2/orders
      operations:
      - name: getorders
        method: GET
        description: Get Orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: integer
          description: Filter orders by status code.
        - name: page
          in: query
          type: integer
          description: Page number for paginated results.
        - name: pageSize
          in: query
          type: integer
          description: Number of records per page.
    - name: api-v2-orders-key
      path: /api/v2/orders/{key}
      operations:
      - name: getorder
        method: GET
        description: Get Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: subscription-key
      value: '{{env.TOYS_R_US_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: commerce-orders-rest
    port: 8080
    description: REST adapter for Toys R Us Commerce API — Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/orders
      name: api-v2-orders
      description: REST surface for api-v2-orders.
      operations:
      - method: GET
        name: getorders
        description: Get Orders
        call: commerce-orders.getorders
        with:
          status: rest.status
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/orders/{key}
      name: api-v2-orders-key
      description: REST surface for api-v2-orders-key.
      operations:
      - method: GET
        name: getorder
        description: Get Order
        call: commerce-orders.getorder
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: commerce-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toys R Us Commerce API — Orders. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-orders
      description: Get Orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: commerce-orders.getorders
      with:
        status: tools.status
        page: tools.page
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: get-order
      description: Get Order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: commerce-orders.getorder
      outputParameters:
      - type: object
        mapping: $.
