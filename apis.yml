apis:
  - aid: toys-r-us:logicbroker-commerce
    name: Toys R Us Commerce API
    description: >-
      The Toys R Us Commerce API, powered by LogicBroker, enables supplier and dropship vendor integrations for the
      complete order lifecycle. Supports purchase order retrieval (EDI 850), order acknowledgement (EDI 855), shipment
      notification (EDI 856), invoice processing (EDI 810), and product catalog synchronization. Vendors authenticate
      using an API subscription key.
    humanURL: https://toysrus.logicbroker.com/hc/en-us/articles/9357008230164-API-Documentation
    baseURL: https://commerceapi.io
