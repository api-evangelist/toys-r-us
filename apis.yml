aid: toys-r-us
name: Toys R Us
description: >-
  Toys 'R' Us is a leading toys and juvenile-products retailer offering a vast selection of toys, games, baby products,
  and children's apparel through retail stores and e-commerce sites. The brand integrates with suppliers and dropship
  vendors via the LogicBroker commerce platform, providing APIs for order management, shipment processing, product
  catalog synchronization, and invoice workflows.
type: Index
